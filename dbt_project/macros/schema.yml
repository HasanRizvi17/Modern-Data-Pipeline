version: 2

macros:

  - name: generate_schema_name
    description: Overrides dbt's default schema naming logic to control how schemas are created per target/environment.
    arguments:
      - name: custom_schema_name
        type: string
        description: Optional schema name configured on a model/source
      - name: node
        type: string
        description: dbt node metadata for the resource being built

  - name: apply_discount
    description: >
      Computes the discount amount to apply based on discount type. For fixed discounts it returns the discount amount,
      for percentage discounts it treats discount_amount as a whole percent (e.g. 10 = 10%) and applies it to the
      gross value of the rental cost.
    arguments:
      - name: discount_type
        type: string
        description: Type of discount (fixed or percentage)
      - name: discount_amount
        type: numeric
        description: Configured discount value
      - name: gross_value
        type: numeric
        description: Base rental cost the discount is applied to 

  - name: convert_to_euro
    description: >
      Converts a given amount from a other currencies to Euro using provided exchange rates
    arguments:
      - name: amount
        type: numeric
        description: Amount in original currency
      - name: rate
        type: numeric
        description: Exchange rate to convert the amount to Euro

  - name: standardize_string
    description: >
      Standardizes a string by trimming whitespace, converting to lowercase and replacing blank/emptys strings with NULL.
    arguments:
      - name: col
        type: string
        description: The string to be standardized
      - name: lower
        type: string
        description: Whether to convert the string to lowercase (default = 'yes')
      - name: nullif_empty
        type: string
        description: Whether to replace empty strings with NULL (default = 'yes')

  - name: cast_iso_datetimes
    description: >
      Casts a list of string fields representing ISO 8601 datetime values to proper DATETIME type in BigQuery.
    arguments:
      - name: field_names
        type: list
        description: List of field names to cast to DATETIME
      - name: timezone
        type: string
        description: Timezone to use for the DATETIME conversion (default = "Europe/Berlin")

  - name: json_extract_fields
    description: >
      Extracts multiple fields from a JSON string using JSON_EXTRACT_SCALAR and aliases them appropriately.
    arguments:
      - name: json_column
        type: string
        description: The name of the JSON string field to extract from
      - name: fields
        type: list
        description: List of field names to extract from the JSON column

  - name: limit_data_in_dev
    description: >
      Adds a WHERE clause limiting rows to a recent lookback window when running against the dev target, to
      reduce dev run time/cost on high-volume sources. The window is anchored to MAX(column_name) in the source
      itself (not wall-clock CURRENT_TIMESTAMP), so it works correctly against frozen/historical seed data as well
      as live-streaming sources. No-op (renders nothing) outside of dev. Only applied to fact-like/transactional
      staging sources, not slowly-changing reference tables, so dev-side relationships tests against unfiltered
      dimension parents keep passing.
    arguments:
      - name: column_name
        type: string
        description: The source timestamp column to filter on (the raw ingestion `timestamp` column)
      - name: source_relation
        type: relation
        description: The same source() relation used in the model's FROM clause, used to compute MAX(column_name)
      - name: dev_days_back
        type: numeric
        description: Number of days of data (relative to the source's own most recent row) to keep when running in dev (default = 3)

  - name: drop_stale_nodes
    description: >
      Run-operation that finds tables/views sitting in our managed datasets which no longer correspond to a current
      model, seed, or snapshot (e.g. left behind after a rename or deletion) and drops them. Only scans datasets
      that appear among our own buildable nodes, so source/raw datasets are never touched. Defaults to a dry run
      that just logs what would be dropped.
    arguments:
      - name: dryrun
        type: boolean
        description: When true (default), only logs orphaned relations found. When false, actually drops them.

  - name: drop_unreferenced_nodes
    description: >
      Run-operation that finds staging/intermediate models with no downstream dependents -- i.e. no other model,
      seed, or snapshot in the project currently has a ref() to them -- and drops their tables. Logs a per-layer
      summary (total vs. unused count for staging, and the same for intermediate) before listing the unreferenced
      models by name. Only looks at dependencies inside dbt (ref()/source()); a model queried directly by a BI tool
      or notebook outside dbt would still be flagged, so review the dry-run output before dropping. Defaults to a
      dry run that just logs what would be dropped.
    arguments:
      - name: dryrun
        type: boolean
        description: When true (default), only logs unreferenced models found. When false, actually drops them.