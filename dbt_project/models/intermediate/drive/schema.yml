version: 2

models:

  - name: drive_users_int
    description: >
      Intermediate model enriching user records with geographic, market,
      and tenure-related attributes derived from staging tables.
      One row per user.

    columns:
      - name: user_id
        description: Unique identifier of the user
        tests:
          - not_null
          - unique

      - name: city_id
        description: Unique identifier of the city

      - name: country_id
        description: Unique identifier of the country

      - name: market_id
        description: Unique identifier of the market

      - name: user_email
        description: Email address associated with the user account

      - name: user_status
        description: "{{ doc('user_status') }}"
        tests:
          - not_null

      - name: city_name
        description: Name of the city associated with the user

      - name: country
        description: Name of the country associated with the user

      - name: iso_code
        description: ISO alpha-2 country code associated with the user

      - name: market
        description: Name of the market associated with the user

      - name: user_tenure_days
        description: Number of days since the user was created
        tests:
          - not_null

      - name: user_tenure_days_group
        description: Bucketed grouping of user tenure in days
        tests:
          - not_null

      - name: is_active_user
        description: Boolean flag indicating whether the user is currently active

      - name: is_validated_user
        description: Boolean flag indicating whether the user has been validated

      - name: created_at
        description: Timestamp at which the user was created
        tests:
          - not_null

      - name: created_date
        description: Date at which the user was created
        tests:
          - not_null

      - name: updated_at
        description: Timestamp at which the user was last updated

      - name: ingestion_timestamp
        description: Timestamp at which the user record was ingested into the analytics warehouse
        tests:
          - not_null


  - name: drive_vehicles_int
    description: >
      Intermediate model enriching vehicle records with fleet, model,
      and geographic context.
      One row per vehicle.

    columns:
      - name: vehicle_id
        description: Unique identifier of the vehicle
        tests:
          - not_null
          - unique

      - name: city_id
        description: Unique identifier of the city
        tests:
          - not_null

      - name: city_name
        description: Name of the city where the vehicle is assigned

      - name: model_id
        description: Unique identifier of the vehicle model
        tests:
          - not_null

      - name: fleet_id
        description: Unique identifier of the vehicle fleet
        tests:
          - not_null

      - name: vehicle_status
        description: "{{ doc('vehicle_status') }}"
        tests:
          - not_null

      - name: battery_level
        description: Battery charge level of the vehicle

      - name: fuel_level
        description: Fuel level of the vehicle

      - name: brand
        description: Manufacturer brand of the vehicle model

      - name: model_name
        description: Model name of the vehicle

      - name: energy_type
        description: Energy type used by the vehicle

      - name: segment
        description: "{{ doc('vehicle_model_segment') }}"

      - name: seats
        description: Number of seats available in the vehicle

      - name: fleet_name
        description: Name of the vehicle fleet

      - name: company_type
        description: "{{ doc('vehicle_fleet_company_type') }}"

      - name: city
        description: Name of the city where the vehicle is located

      - name: country
        description: Name of the country where the vehicle is located

      - name: iso_code
        description: ISO alpha-2 country code associated with the vehicle

      - name: market
        description: Name of the market where the vehicle operates

      - name: created_at
        description: Timestamp at which the vehicle was created
        tests:
          - not_null

      - name: updated_at
        description: Timestamp at which the vehicle was last updated

      - name: ingestion_timestamp
        description: Timestamp at which the vehicle record was ingested into the analytics warehouse
        tests:
          - not_null


  - name: drive_rental_base_int
    description: >
      Intermediate model serving as the core rental spine, enriching rental
      records with user, vehicle, geography, and pricing context.
      One row per rental.

    columns:
      - name: rental_id
        description: Unique identifier of the rental
        tests:
          - not_null
          - unique

      - name: user_id
        description: Unique identifier of the user
        tests:
          - not_null

      - name: vehicle_id
        description: Unique identifier of the vehicle
        tests:
          - not_null

      - name: package_id
        description: Unique identifier of the rental package

      - name: promo_id
        description: Unique identifier of the promotion applied to the rental

      - name: reservation_id
        description: Unique identifier of the reservation

      - name: incident_id
        description: Unique identifier of the incident associated with the rental

      - name: start_city_id
        description: Unique identifier of the rental start city
        tests:
          - not_null

      - name: end_city_id
        description: Unique identifier of the rental end city
        tests:
          - not_null

      - name: start_city
        description: Name of the rental start city

      - name: end_city
        description: Name of the rental end city

      - name: start_country
        description: Name of the rental start country

      - name: end_country
        description: Name of the rental end country

      - name: is_inter_city_travel
        description: Indicates whether the rental started and ended in different cities

      - name: currency
        description: Currency of the rental's start country, used as the rental's local currency

      - name: rental_status
        description: "{{ doc('rental_status') }}"
        tests:
          - not_null

      - name: package_name
        description: "{{ doc('rental_package') }}"

      - name: start_time
        description: Timestamp at which the rental was started
        tests:
          - not_null

      - name: end_time
        description: Timestamp at which the rental was ended

      - name: rental_duration_min
        description: Total duration of the rental expressed in minutes

      - name: rental_duration_hour
        description: Total duration of the rental expressed in hours

      - name: distance_km
        description: Distance driven during the rental in kilometers

      - name: rental_cost
        description: Base cost of the rental before discounts
        tests:
          - not_null

      - name: reserved_at
        description: Timestamp when the rental was reserved

      - name: reservation_start_at
        description: Scheduled start time of the reservation

      - name: reservation_end_at
        description: Scheduled end time of the reservation

      - name: status
        description: Status of the reservation linked to the rental

      - name: cancellation_reason
        description: Reason the reservation was cancelled, if applicable

      - name: cancelled_at
        description: Timestamp at which the reservation was cancelled, if applicable

      - name: created_at
        description: Timestamp at which the rental was created
        tests:
          - not_null

      - name: created_date
        description: Date at which the rental was created

      - name: updated_at
        description: Timestamp at which the rental was last updated

      - name: ingestion_timestamp
        description: Timestamp at which the rental record was ingested into the analytics warehouse
        tests:
          - not_null


  - name: drive_rental_payments_int
    description: >
      Intermediate model collapsing payments, refunds, and applied-promotion
      records onto rental-level grain, with all amounts converted to EUR so
      rentals paid across multiple currencies still collapse to one row.
      One row per rental.

    columns:
      - name: rental_id
        description: Unique identifier of the rental
        tests:
          - not_null
          - unique

      - name: paid_amount
        description: Total successfully paid amount for the rental, in EUR

      - name: refunded_amount
        description: Total refunded amount for the rental, in EUR, sourced from drive_refund_stg (captures partial refunds)

      - name: failed_amount
        description: Total failed payment amount for the rental, in EUR

      - name: wallet_paid_amount
        description: Portion of the paid amount made via wallet, in EUR

      - name: card_paid_amount
        description: Portion of the paid amount made via card, in EUR

      - name: discount_amount
        description: Total discount amount applied to the rental via promotions, in EUR

      - name: gross_revenue
        description: Paid amount plus any discount granted, before refunds, in EUR

      - name: net_revenue
        description: Paid amount net of refunds, in EUR

      - name: has_refund
        description: Boolean flag indicating whether the rental has any refund

      - name: has_promotion
        description: Boolean flag indicating whether a promotion was applied to the rental


  - name: drive_ticket_lifecycle_int
    description: >
      Intermediate model enriching support tickets with status-change history
      (response, escalation, and resolution timestamps/counts). One row per
      ticket. This is the single source of truth for ticket lifecycle/escalation
      logic, consumed by both drive_support_tickets_fct and drive_rental_issues_int.

    columns:
      - name: ticket_id
        description: Unique identifier of the support ticket
        tests:
          - not_null
          - unique

      - name: rental_id
        description: Identifier of the rental associated with the ticket, if any
        tests:
          - relationships:
              to: ref('drive_rentals_fct')
              field: rental_id
              config:
                severity: warn

      - name: user_id
        description: Identifier of the user who created the support ticket
        tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('drive_users_dim')
              field: user_id

      - name: user_city_id
        description: Identifier of the home city of the user who created the support ticket

      - name: user_city
        description: Home city name of the user who created the support ticket (distinct from any rental's start/end city)

      - name: is_linked_to_rental
        description: Indicates whether the ticket is linked to a rental

      - name: ticket_support_rating
        description: Satisfaction rating provided for the support ticket, if any

      - name: reopen_count
        description: Number of times the support ticket was reopened

      - name: escalation_count
        description: Number of times the support ticket was escalated

      - name: ticket_has_escalation
        description: Indicates whether the ticket was escalated at least once

      - name: first_response_at
        description: Timestamp of the first response to the support ticket

      - name: first_escalated_at
        description: Timestamp when the ticket was first escalated

      - name: resolved_at
        description: Timestamp when the support ticket was resolved

      - name: ticket_created_at
        description: Timestamp when the support ticket was created
        tests:
          - not_null

      - name: ticket_updated_at
        description: Timestamp when the support ticket was last updated


  - name: drive_rental_ratings_int
    description: >
      Intermediate model collapsing rental rating records on rental-level.
      One row per rental.

    columns:
      - name: rental_id
        description: Unique identifier of the rental
        tests:
          - not_null
          - unique

      - name: user_id
        description: Identifier of the user who rented, joined from drive_rental_base_int
        tests:
          - relationships:
              to: ref('drive_users_dim')
              field: user_id

      - name: vehicle_id
        description: Identifier of the vehicle rented, joined from drive_rental_base_int
        tests:
          - relationships:
              to: ref('drive_vehicles_dim')
              field: vehicle_id

      - name: avg_rating_value
        description: Average rating score across all ratings for the rental

      - name: rating_count
        description: Number of ratings submitted for the rental

      - name: first_rating_delay_hours
        description: Hours between rental end and the earliest rating submitted

      - name: is_5_star_rating
        description: Indicates whether the rental's average rating is a perfect 5 stars

      - name: is_1_star_rating
        description: Indicates whether the rental's average rating is the lowest, 1 star


  - name: drive_rental_issues_int
    description: >
      Intermediate model combining aggregated support-ticket and incident
      activity for each rental. One row per rental; multiple tickets/incidents
      on the same rental are rolled up into counts, not individual rows.

    columns:
      - name: rental_id
        description: Unique identifier of the rental
        tests:
          - not_null
          - unique

      - name: user_id
        description: Identifier of the user who rented, joined from drive_rental_base_int
        tests:
          - relationships:
              to: ref('drive_users_dim')
              field: user_id

      - name: vehicle_id
        description: Identifier of the vehicle rented, joined from drive_rental_base_int
        tests:
          - relationships:
              to: ref('drive_vehicles_dim')
              field: vehicle_id

      - name: city_id
        description: Identifier of the rental's start city, joined from drive_rental_base_int

      - name: ticket_support_rating
        description: Average satisfaction rating across support tickets linked to the rental

      - name: ticket_count
        description: Number of support tickets linked to the rental

      - name: first_ticket_created_at
        description: Timestamp of the earliest support ticket linked to the rental

      - name: last_ticket_created_at
        description: Timestamp of the latest support ticket linked to the rental

      - name: ticket_first_response_at
        description: Timestamp of the earliest first-response across linked support tickets

      - name: ticket_first_escalated_at
        description: Timestamp of the earliest escalation across linked support tickets

      - name: ticket_resolved_at
        description: Timestamp of the latest resolution across linked support tickets

      - name: ticket_has_escalation
        description: Indicates whether any linked support ticket was escalated

      - name: has_support_ticket
        description: Indicates whether the rental has at least one linked support ticket

      - name: incident_count
        description: Number of incidents linked to the rental

      - name: critical_incident_count
        description: Number of critical-severity incidents linked to the rental

      - name: incidents_with_police_report_filed
        description: Number of linked incidents with a police report filed

      - name: incident_estimated_cost
        description: Total estimated cost across incidents linked to the rental

      - name: first_incident_reported_at
        description: Timestamp of the earliest incident linked to the rental

      - name: last_incident_reported_at
        description: Timestamp of the latest incident linked to the rental

      - name: has_incident
        description: Indicates whether the rental has at least one linked incident
