version: 2

models:
  - name: mkt_daily_promotions_performance_mart
    description: >
      Daily marketing mart analyzing promotion performance in the car-sharing
      business. Aggregated at promotion-date level on a full promo x date
      spine bounded to each promotion's active window (including forward-dated
      windows), so zero-redemption days appear rather than being silently
      absent. Tracks redemptions, redemption-rate/repeat-usage, rental
      revenue, and discount cost to evaluate promotional effectiveness.

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - promo_id
            - date

      - dbt_utils.expression_is_true:
          expression: "rentals >= 0"

      - dbt_utils.expression_is_true:
          expression: "rental_revenue >= 0"

      - dbt_utils.expression_is_true:
          expression: "discount_amount >= 0"

      - dbt_utils.expression_is_true:
          expression: "rental_revenue >= discount_amount"

      - dbt_utils.expression_is_true:
          expression: "redemptions >= 0"

      - dbt_utils.expression_is_true:
          expression: "unique_users_redeemed <= redemptions"

    columns:
      - name: promo_id
        description: Identifier of the promotion applied to rentals.
        tests:
          - not_null

      - name: promo_code
        description: Promotion code used by customers.

      - name: discount_type
        description: Type of discount applied by the promotion.

      - name: date
        description: Calendar date within the promotion's active window.
        tests:
          - not_null

      - name: rentals
        description: Number of distinct rentals where the promotion was redeemed on the date.

      - name: rental_revenue
        description: Total rental revenue generated from rentals using the promotion on the date, in EUR.

      - name: discount_amount
        description: Total discount amount granted by the promotion on the date, in EUR.

      - name: redemptions
        description: Number of redemption events recorded for the promotion on the date, from drive_user_promotion_stg.

      - name: unique_users_redeemed
        description: Number of distinct users who redeemed the promotion on the date.

      - name: repeat_redemptions
        description: Number of redemption events on the date that were not the redeeming user's first redemption of this promotion.

      - name: discount_payback_ratio
        description: >
          (rental_revenue - discount_amount) / discount_amount. Not a true ROI:
          it ignores ad spend and doesn't net out revenue the customer would
          have generated without the promo. Relabeled from "roi" for that reason.

      - name: rolling_7d_discount_payback_ratio
        description: >
          discount_payback_ratio computed over rental_revenue and discount_amount
          summed across the trailing 7 days (current date inclusive) for this
          promo, rather than averaging the daily ratios.

      - name: loaded_at
        description: Timestamp at which this mart row was last built.
