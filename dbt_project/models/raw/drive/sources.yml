    # source tables
    tables:
      - name: drive_city_raw
        description: "Raw table containing JSON data for cities ingested from the DriveX database on MongoDB"
        columns:
          - name: document_id
            description: "Unique identifier of the source MongoDB document this row was captured from (the Mongo _id), distinct from the business-level ID stored inside the data payload."
          - name: operation
            description: "Change-data-capture operation type that produced this row (e.g. insert, update, delete) from the source MongoDB collection."
          - name: timestamp
            description: "Timestamp at which this row was ingested into the raw layer."
          - name: data
            description: "Raw JSON payload containing the full city record as captured from MongoDB."
          - name: date
            description: "Ingestion/partition date for this row, used to partition the raw table in BigQuery."
